<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Favoritos · AEF</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="topbar">
    <h1><a href="/" style="color:inherit;text-decoration:none;">📚 AEF · Self-Study</a></h1>
    <nav>
      <div id="study-timer" class="study-timer">
        <span id="study-time" class="study-time">0:00</span>
        <button id="study-toggle" type="button" class="study-toggle">▶ Check-in</button>
      </div>
      <a href="/">Cursos</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/favorites" class="active">Favoritos</a>
      <a href="/flashcards">Flashcards</a>
    </nav>
  </header>
  <main id="main"><div class="loading">Carregando…</div></main>

  <div class="floating-player" id="floating-player">
    <div class="fp-info">
      <div class="fp-title">—</div>
      <div class="fp-time">0:00 / 0:00</div>
    </div>
    <audio controls preload="metadata"></audio>
    <select class="fp-speed" title="Velocidade">
      <option value="0.5">0.5×</option>
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
    <button class="fp-close" title="Fechar player">×</button>
  </div>

  <script type="module">
    import { initPlayer } from "/static/js/player/floating.js";
    import { renderFavorites } from "/static/js/pages/favorites.js";
    import { initStudyTimer } from "/static/js/study_timer.js";
    initPlayer();
    initStudyTimer();
    renderFavorites(document.getElementById("main"));
  </script>
</body>
</html>
